<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Rename Pro</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div id="app">
      <p style="color: black">.</p>
      <button id="btnSelectFolder">Select Folder</button>
      <p id="labelDisplaySelectedFolder">Selected Folder:<br>(...)</p>
      <hr>
      <div id="divPreviewBox">
        <div class="divPreviewBoxInLists">
          <p>Before</p>
          <br>
          <p id="labelDisplayFileListBefore">(...)</p>
        </div>
        <p id="labelDisplayFileListArrow"><br><br>→</p>
        <div class="divPreviewBoxInLists">
          <p>After</p>
          <br>
          <p id="labelDisplayFileListAfter">(...)</p>
        </div>
      </div>
      <hr>
      <input type="text" id="inputNewName" name="New Name" placeholder="New Name">
      <button id="btnRename">Rename</button>
      <p style="color: black">.</p>
    </div>
  </body>
</html>
